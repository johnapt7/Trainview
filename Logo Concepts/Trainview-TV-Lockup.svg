<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Trainview logo</title>
  <desc id="desc">A connected TV railway-route monogram above the Trainview wordmark.</desc>

  <rect width="1600" height="1200" fill="#F0EAD8"/>

  <g transform="translate(288 5)">
    <g fill="none" stroke="#0E2D38" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
      <path d="M145 425C235 425 215 275 320 275H512"/>
      <path d="M320 275V745"/>
      <path d="M512 275L700 745"/>
      <path d="M700 745C745 610 720 345 880 275"/>
    </g>

    <g fill="#F0EAD8" stroke="#0E2D38" stroke-width="20">
      <circle cx="145" cy="425" r="35"/>
      <circle cx="320" cy="275" r="35"/>
      <circle cx="512" cy="275" r="35"/>
      <circle cx="320" cy="745" r="35"/>
      <circle cx="700" cy="745" r="35"/>
      <circle cx="880" cy="275" r="35"/>
    </g>

    <circle cx="700" cy="745" r="14" fill="#C9E265"/>
  </g>

  <text
    x="800"
    y="1060"
    fill="#0E2D38"
    font-family="-apple-system, BlinkMacSystemFont, 'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="190"
    font-weight="650"
    letter-spacing="-10"
    text-anchor="middle"
