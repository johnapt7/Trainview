<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Trainview TV route logo</title>
  <desc id="desc">The letters T and V drawn as a connected railway route above the Trainview wordmark.</desc>

  <rect width="1024" height="1024" fill="#F0EAD8"/>

  <g transform="translate(87 0) scale(.83)">
    <g fill="none" stroke="#0E2D38" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
      <!-- The T bar hands directly into the V at a shared interchange. -->
      <path d="M145 425C235 425 215 275 320 275H512"/>
      <path d="M320 275V745"/>
      <path d="M512 275L700 745"/>
      <path d="M700 745C745 610 720 345 880 275"/>
    </g>

    <g fill="#F0EAD8" stroke="#0E2D38" stroke-width="20">
      <circle cx="145" cy="425" r="35"/>
      <circle cx="320" cy="275" r="35"/>
      <circle cx="512" cy="275" r="35"/>
      <circle cx="320" cy="745" r="35"/>
      <circle cx="700" cy="745" r="35"/>
      <circle cx="880" cy="275" r="35"/>
    </g>

    <!-- One live station: the only accent needed at app-icon scale. -->
    <circle cx="700" cy="745" r="14" fill="#C9E265"/>
  </g>

  <text
    x="512"
    y="876"
    fill="#0E2D38"
    font-family="-apple-system, BlinkMacSystemFont, 'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="142"
    font-weight="650"
    letter-spacing="-7"
    text-anchor="middle"
  >Trainview</text>
</svg>
